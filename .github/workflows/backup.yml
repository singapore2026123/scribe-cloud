name: Backup Supabase DB to R2

# Daily Postgres backup (roles + schema + data) zipped and uploaded to Cloudflare R2.
on:
  schedule:
    - cron: "0 3 * * *"   # 03:00 UTC daily
  workflow_dispatch: {}     # allow manual run from the Actions tab

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Dump database
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          set -e
          STAMP=$(date +%F)
          mkdir -p backup
          supabase db dump --db-url "$DB_URL" --role-only -f backup/roles.sql
          supabase db dump --db-url "$DB_URL"             -f backup/schema.sql
          supabase db dump --db-url "$DB_URL" --data-only -f backup/data.sql
          zip -r "backup-$STAMP.zip" backup
          echo "STAMP=$STAMP" >> "$GITHUB_ENV"

      - name: Upload to Cloudflare R2 (S3 API)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          aws s3 cp "backup-$STAMP.zip" \
            "s3://${{ secrets.R2_BUCKET }}/backup-$STAMP.zip" \
            --endpoint-url "${{ secrets.R2_ENDPOINT }}"
