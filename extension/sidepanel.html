<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ケアトーク × Scribe Cloud — 多言語音声対話型介護記録 プロトタイプ</title>
<!-- v0.4.0-SC 2026-07-16: 02(日本語CareTalk)+ Scribe Cloud 統合。日/英=ブラウザ音声認識(即時)、中/馬/泰/緬=Scribe(/transcribe)で認識+日本語へ翻訳→対話エンジンでCWマスタ記録化。認識レイヤのみ差し替え、スロット抽出はローカル規則のまま。 -->
<style>
  :root{
    --bg:#f2f4f7; --card:#ffffff; --ink:#1a2433; --sub:#68758a;
    --accent:#0f6e5d; --accent-soft:#e2f3ef; --user:#0f6e5d; --line:#e3e7ee;
    --warn:#b45309; --blue:#1d5fbf; --blue-soft:#e7effc;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{margin:0; font-family:"Hiragino Sans","Yu Gothic UI","Meiryo",sans-serif; background:#dfe4ea; color:var(--ink);}
  #app{max-width:480px; margin:0 auto; height:100dvh; display:flex; flex-direction:column; background:var(--bg); box-shadow:0 0 24px rgba(0,0,0,.12); position:relative;}
  header{background:var(--accent); color:#fff; padding:10px 14px; display:flex; align-items:center; gap:8px; flex-shrink:0;}
  header .title{font-weight:700; font-size:16px;}
  header .tag{font-size:10px; background:rgba(255,255,255,.2); border-radius:99px; padding:2px 8px;}
  header .spacer{flex:1;}
  .hbtn{background:rgba(255,255,255,.15); border:none; color:#fff; border-radius:8px; padding:6px 10px; font-size:12px; cursor:pointer;}
  .hbtn.on{background:#fff; color:var(--accent); font-weight:700;}
  #banner{background:#fff7ed; color:var(--warn); font-size:12px; padding:8px 14px; border-bottom:1px solid #fed7aa; display:none;}
  #settings{display:none; background:#fff; border-bottom:1px solid var(--line); padding:10px 14px; font-size:12px;}
  #settings .row{display:flex; align-items:center; gap:8px; margin-bottom:6px; flex-wrap:wrap;}
  #settings input[type=text],#settings input[type=password]{flex:1; min-width:120px; border:1px solid var(--line); border-radius:8px; padding:7px; font-size:12px;}
  #settings label{display:flex; align-items:center; gap:4px;}
  #settings .note{color:var(--sub); font-size:10.5px; line-height:1.5;}
  #aistate{font-weight:700;}
  #progress{padding:10px 14px 6px; display:none; flex-shrink:0; background:var(--bg);}
  #progress .pname{font-size:12px; font-weight:700; color:var(--accent); margin-bottom:6px;}
  #pills{display:flex; flex-wrap:wrap; gap:6px;}
  .pill{font-size:11px; border-radius:99px; padding:4px 10px; border:1px solid var(--line); background:#fff; color:var(--sub);}
  .pill.done{background:var(--accent-soft); border-color:var(--accent); color:var(--accent); font-weight:600; cursor:pointer;}
  .pill.miss{background:var(--blue-soft); border-color:var(--blue); color:var(--blue); font-weight:700;}
  #chat{flex:1; overflow-y:auto; padding:14px; display:flex; flex-direction:column; gap:10px;}
  .msg{max-width:84%; padding:10px 13px; border-radius:16px; font-size:14px; line-height:1.65; white-space:pre-wrap; word-break:break-word;}
  .msg.ai{background:var(--card); border:1px solid var(--line); border-bottom-left-radius:4px; align-self:flex-start;}
  .msg.user{background:var(--user); color:#fff; border-bottom-right-radius:4px; align-self:flex-end;}
  .msg.sys{background:transparent; color:var(--sub); font-size:11px; align-self:center; padding:2px;}
  .msg.listen{background:var(--blue-soft); color:var(--blue); border-bottom-right-radius:4px; align-self:flex-end; font-size:13px;}
  .msg.think{background:#f6f2ff; color:#6b4fbf; border-bottom-left-radius:4px; align-self:flex-start; font-size:13px;}
  .card{align-self:flex-start; max-width:90%; background:#fff; border:1.5px solid var(--accent); border-radius:14px; overflow:hidden; font-size:13px;}
  .card .chead{background:var(--accent); color:#fff; padding:7px 12px; font-weight:700; font-size:13px; display:flex; justify-content:space-between; gap:12px;}
  .card table{border-collapse:collapse; width:100%;}
  .card td{padding:6px 12px; border-top:1px solid var(--line); vertical-align:top;}
  .card td.k{color:var(--sub); white-space:nowrap; width:1%; padding-right:16px;}
  .card td.v{font-weight:600;}
  #chips{padding:6px 14px; display:flex; flex-wrap:wrap; gap:8px; flex-shrink:0;}
  .chip{background:#fff; border:1.5px solid var(--accent); color:var(--accent); border-radius:99px; padding:8px 14px; font-size:13px; font-weight:600; cursor:pointer;}
  .chip:active{background:var(--accent-soft);}
  .chip.ghost{border-color:var(--line); color:var(--sub); font-weight:400;}
  .chip.go{background:var(--accent); color:#fff;}
  #bar{display:flex; gap:8px; padding:10px 14px calc(10px + env(safe-area-inset-bottom)); background:#fff; border-top:1px solid var(--line); flex-shrink:0; align-items:center;}
  #mic{width:52px; height:52px; border-radius:50%; border:none; background:var(--accent); color:#fff; font-size:22px; cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center;}
  #mic.rec{background:#d92d20; animation:pulse 1.2s infinite;}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(217,45,32,.35)} 50%{box-shadow:0 0 0 6px rgba(217,45,32,0)}}
  #mic:disabled{background:#c7ced9;}
  #ti{flex:1; border:1.5px solid var(--line); border-radius:12px; padding:12px; font-size:14px; outline:none;}
  #ti:focus{border-color:var(--accent);}
  #send{border:none; background:none; color:var(--accent); font-weight:700; font-size:14px; cursor:pointer; padding:8px;}
  #recpanel{display:none; position:absolute; inset:0; background:rgba(20,28,40,.45); z-index:10;}
  #recinner{position:absolute; bottom:0; left:0; right:0; max-height:75%; overflow-y:auto; background:var(--bg); border-radius:16px 16px 0 0; padding:16px; display:flex; flex-direction:column; gap:10px;}
</style>
</head>
<body>
<div id="app">
  <header>
    <div><div class="title">ケアトーク</div><div class="tag">× Scribe Cloud v0.4.0</div></div>
    <div class="spacer"></div>
    <select id="langSel" title="話す言語（入力）" style="background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:8px;padding:6px 6px;font-size:12px;cursor:pointer;">
      <option value="ja">🎙 日本語</option>
      <option value="en">☁ English</option>
      <option value="zh">☁ 中文</option>
      <option value="ms">☁ Bahasa</option>
      <option value="ta">☁ தமிழ்</option>
      <option value="my">☁ မြန်မာ</option>
    </select>
    <button class="hbtn on" id="btnAuto" title="応答後に自動でマイクを開く">連続</button>
    <button class="hbtn on" id="btnTts">読上げ</button>
    <button class="hbtn" id="btnAI">⚙AI</button>
    <button class="hbtn" id="btnRecs">記録 <span id="recCount">0</span></button>
  </header>
  <div id="banner"></div>
  <div id="settings">
    <div class="row"><label><input type="checkbox" id="aiOn"> AI抽出を使う（Gemini）</label> <span id="aistate"></span></div>
    <div class="row"><input type="password" id="aiKey" placeholder="Gemini APIキー（AI Studio で取得）"></div>
    <div class="row"><input type="text" id="aiModel" value="gemini-2.5-flash" placeholder="モデル名"> <label><input type="checkbox" id="aiSave"> この端末に保存</label></div>
    <div class="note">AIモードON: 発話全体をLLMがスロット抽出し、音声認識の同音誤変換（全寮→全量 等）も文脈で補正します。キーはこの端末内でのみ使用（検証用）。OFFでもルール辞書で動作します。</div>
  </div>
  <div id="progress"><div class="pname" id="pname"></div><div id="pills"></div></div>
  <div id="chat"></div>
  <div id="chips"></div>
  <div id="bar">
    <button id="mic" title="話す">&#127908;</button>
    <input id="ti" type="text" placeholder="話す代わりに入力もできます" autocomplete="off">
    <button id="send">送信</button>
  </div>
  <div id="recpanel"><div id="recinner"></div></div>
</div>

<script src="sidepanel.js"></script>
</body>
</html>
