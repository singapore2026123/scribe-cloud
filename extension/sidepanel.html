<!doctype html>
<html><head><meta charset="utf-8">
<style>
 body{font-family:Segoe UI,system-ui,sans-serif;margin:0;padding:12px;color:#14202B}
 h1{font-size:15px;margin:0 0 10px} h1 b{color:#0F766E}
 .row{display:flex;gap:8px;margin-bottom:8px}
 select{flex:1;font:inherit;font-size:13px;padding:6px 8px;border:1px solid #DCE3E7;border-radius:6px;background:#fff}
 button{font:inherit;font-size:13px;font-weight:600;padding:8px 10px;border-radius:7px;border:1px solid #DCE3E7;background:#fff;cursor:pointer}
 #start{flex:1;background:#0F766E;border-color:#0F766E;color:#fff} #stop{flex:1;border-color:#C2622A;color:#C2622A}
 button:disabled{opacity:.45;cursor:default}
 .status{font-size:12px;color:#5C6B78;margin:6px 0;min-height:16px}
 #feed{margin-top:6px}
 .line{border-bottom:1px solid #EEF2F4;padding:8px 0}
 .o{font-size:15px;line-height:1.45} .t{font-size:13px;color:#5C6B78;margin-top:2px}
</style></head>
<body>
 <h1>Scrib<b>e</b> — Live Tab Audio</h1>
 <div class="row">
  <select id="lang"><option value="my">Burmese</option><option value="ja">Japanese</option><option value="en">English</option><option value="ms">Malay</option><option value="zh">Chinese</option><option value="ta">Tamil</option><option value="ko">Korean</option><option value="th">Thai</option><option value="id">Indonesian</option><option value="vi">Vietnamese</option><option value="hi">Hindi</option><option value="fr">French</option></select>
  <select id="target"><option value="en">&rarr; English</option><option value="off">No translation</option><option value="zh-CN">&rarr; Chinese</option><option value="ms">&rarr; Malay</option><option value="ta">&rarr; Tamil</option><option value="ja">&rarr; Japanese</option><option value="my">&rarr; Burmese</option><option value="ko">&rarr; Korean</option><option value="th">&rarr; Thai</option><option value="id">&rarr; Indonesian</option><option value="vi">&rarr; Vietnamese</option><option value="hi">&rarr; Hindi</option><option value="fr">&rarr; French</option></select>
 </div>
 <div class="row"><button id="start">Start</button><button id="stop" disabled>Stop</button><button id="copy" title="Copy original">Copy</button></div>
 <div class="status" id="status">Pick a language &rarr; Start. Lines appear ~every 8 s. (Open this panel from a normal web page, not a chrome:// page.)</div>
 <div id="feed"></div>
 <script src="sidepanel.js"></script>
</body></html>
